---
layout: default
---
<!-- page.html -->
<div class="post">
  <header class="post-header">
    {% unless page.title == "Publications" %}
      <h1 class="post-title">{{ page.title }}</h1>
    {% endunless %}
    <p class="post-description">{{ page.description }}</p>
  </header>

  <article>
    {{ content }}
  </article>
</div>
